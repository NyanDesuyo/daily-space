services:
  caddy:
    image: caddy:2-alpine
    container_name: daily-space-caddy
    ports:
      - "9006:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daily-space-app
    # Port 3000 not exposed to host - only accessible via Caddy
    expose:
      - "3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NODE_ENV=production
    volumes:
      - db-data:/app/prisma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=64m
    stop_grace_period: 30s
    stop_signal: SIGTERM

volumes:
  db-data:
  caddy_data:
  caddy_config:
